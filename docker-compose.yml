version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html/
    depends_on:
      - db
    environment:
      - DB_HOST=db

  db:
    image: mariadb:10.5
    environment:
      MYSQL_ROOT_PASSWORD: d1nosauri0Z
      MYSQL_DATABASE: cdcol
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
